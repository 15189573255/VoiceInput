name: mobile
description: "VoiceInput - Mobile voice keyboard for the desktop receiver."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.0.0
  web_socket_channel: ^3.0.1
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  multicast_dns: ^0.3.2
  http: ^1.2.2
  record: 5.1.2
  path_provider: ^2.1.4

dependency_overrides:
  # record 5.x's Linux federated impl (record_linux 0.7.2) lags behind the
  # platform interface contract. Android-only build still compiles the Linux
  # source path, so force a matching pair until upstream catches up.
  record_platform_interface: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
